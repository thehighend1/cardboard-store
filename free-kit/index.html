<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Get Your FREE Cardboard Creations Starter Kit 🎁</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{--blue:#1A237E;--blue2:#1565C0;--green:#43A047;--green2:#2e7d32;}
  *{box-sizing:border-box}
  body{margin:0;background:#f4f6fb;color:#1a1f36;font-family:'Nunito',system-ui,sans-serif;line-height:1.6;display:flex;min-height:100vh;align-items:center;justify-content:center;padding:24px}
  .card{background:#fff;max-width:520px;width:100%;border-radius:22px;box-shadow:0 18px 50px rgba(26,35,54,.14);padding:40px 34px;text-align:center}
  .kit-emoji{font-size:3rem;line-height:1;margin-bottom:6px}
  h1{font-family:'Fredoka',sans-serif;font-weight:700;color:var(--blue);font-size:1.85rem;margin:.2em 0 .1em}
  .sub{color:#5a6478;font-size:1.05rem;margin:0 auto 22px;max-width:420px}
  form{display:flex;flex-direction:column;gap:12px;margin:0 auto;max-width:400px}
  input[type=email]{font-family:'Nunito',sans-serif;font-size:1.05rem;padding:15px 16px;border:2px solid #d5dbe8;border-radius:12px;outline:none;width:100%}
  input[type=email]:focus{border-color:var(--blue2)}
  button{font-family:'Fredoka',sans-serif;font-weight:600;font-size:1.15rem;color:#fff;background:var(--green);border:none;border-radius:12px;padding:15px 18px;cursor:pointer;transition:background .15s,transform .05s}
  button:hover{background:var(--green2)}
  button:active{transform:translateY(1px)}
  button:disabled{background:#9aa2b8;cursor:not-allowed}
  .fine{color:#7a839a;font-size:.82rem;margin-top:14px}
  .status{min-height:1.2em;font-size:.95rem;margin-top:8px}
  .status.err{color:#c0392b}
  ul{text-align:left;max-width:400px;margin:6px auto 20px;padding-left:20px;color:#3a4258}
  ul li{margin:3px 0}
</style>
</head>
<body>
  <div class="card">
    <div class="kit-emoji">🎁</div>
    <h1>Your FREE Cardboard Creations Starter Kit</h1>
    <p class="sub">Turn one cardboard box into an epic build with your kids — the first blueprint is on us. Tell us where to send it:</p>
    <form id="kitForm" novalidate>
      <input type="email" id="email" name="email" placeholder="you@email.com" required autocomplete="email">
      <button type="submit" id="btn">Send me the free kit →</button>
      <div class="status" id="status"></div>
    </form>
    <p class="fine">No spam, ever. Just your free kit + the occasional new blueprint. Unsubscribe anytime.</p>
  </div>

<script>
  var form=document.getElementById('kitForm'),
      emailEl=document.getElementById('email'),
      btn=document.getElementById('btn'),
      status=document.getElementById('status');
  var DELIVER='/thanks/starter/';

  function valid(e){return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);}

  form.addEventListener('submit',function(ev){
    ev.preventDefault();
    var email=emailEl.value.trim();
    if(!valid(email)){status.className='status err';status.textContent='Please enter a valid email.';return;}
    btn.disabled=true;btn.textContent='Sending your kit…';status.className='status';status.textContent='';

    // Capture the lead (FormSubmit — delivers to the HEE inbox). Never block the free kit on capture.
    var done=false;
    function go(){ if(done)return; done=true; window.location.href=DELIVER; }

    try{
      fetch('https://formsubmit.co/ajax/rashad@highendmusiconline.com',{
        method:'POST',
        headers:{'Content-Type':'application/json',Accept:'application/json'},
        body:JSON.stringify({email:email,_subject:'New Cardboard Creations free-kit lead',_template:'table',source:'free-kit-gate'})
      }).then(function(){go();}).catch(function(){go();});
    }catch(e){ go(); }

    // Safety net: deliver the kit even if capture is slow/blocked.
    setTimeout(go,2500);
  });
</script>
</body>
</html>
